{% extends 'layout.html' %}
{% block body %}

<div class="page-wrap">

  <div class="section-card text-center">
    <h3>{{ ui.try_again_msg }}</h3>

    {% if error_message %}
      <p class="mt-3"><strong>{{ ui.error_details }}:</strong> {{ error_message }}</p>
    {% endif %}

    <a href="{{ retry_url if retry_url else url_for('home', lang=lang) }}">
      <button class="btn-primary-clean mt-3">
        {{ ui.try_again_btn }}
      </button>
    </a>
  </div>

</div>

{% endblock %}
